<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚马逊单品全链路利润动态测算表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        h1 {
            color: #333;
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .input-side {
            background-color: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
        }
        .result-side {
            background-color: #fff;
        }
        h2 {
            color: #667eea;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        .input-section {
            margin-bottom: 25px;
        }
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 13px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: white;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .result-section {
            padding: 25px;
            background-color: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
        }
        .result-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .result-group {
            display: flex;
            flex-direction: column;
        }
        .result-value {
            font-weight: 600;
            color: #333;
            font-size: 18px;
            padding: 10px;
            background-color: white;
            border-radius: 6px;
            text-align: right;
        }
        .warning {
            color: #e74c3c;
            background-color: #fee;
        }
        .caution {
            color: #f39c12;
            background-color: #fef5e7;
        }
        .sensitivity-section {
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: right;
            border: 1px solid #e8e8e8;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        tr:hover {
            background-color: #e8eaf6;
            transition: background-color 0.2s ease;
        }
        #recordsTable th:first-child, #recordsTable td:first-child {
            text-align: left;
            font-weight: 500;
        }
        #recordsTable th:nth-child(2), #recordsTable td:nth-child(2) {
            text-align: left;
            color: #666;
            font-size: 12px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .btn:active {
            transform: translateY(0);
        }
        .input-highlight {
            background-color: #e8eaf6;
        }
        .result-highlight {
            background-color: #f8f9fa;
        }
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .input-row {
                grid-template-columns: 1fr;
            }
            .result-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>亚马逊单品全链路利润动态测算表</h1>
        </div>
        
        <div class="main-content">
            <!-- 左侧输入区域 -->
            <div class="input-side">
                <!-- 基础与采购数据 -->
                <h2>一、基础与采购数据</h2>
                <div class="input-section">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="productName">产品名称</label>
                            <input type="text" id="productName" value="产品A" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="targetRetailPrice">目标零售价 (USD)</label>
                            <input type="number" id="targetRetailPrice" value="30" step="0.01" oninput="calculate()">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="purchasePrice">采购单价 (CNY)</label>
                            <input type="number" id="purchasePrice" value="50" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="packagingFee">包装及贴标费 (CNY)</label>
                            <input type="number" id="packagingFee" value="5" step="0.01" oninput="calculate()">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="packagingLength">包装尺寸 (cm) - 长</label>
                            <input type="number" id="packagingLength" value="10" step="0.1" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="packagingWidth">包装尺寸 (cm) - 宽</label>
                            <input type="number" id="packagingWidth" value="10" step="0.1" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="packagingHeight">包装尺寸 (cm) - 高</label>
                            <input type="number" id="packagingHeight" value="10" step="0.1" oninput="calculate()">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="productWeight">产品毛重 (kg)</label>
                            <input type="number" id="productWeight" value="0.5" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="packagingSpec">装箱规格 (PCS)</label>
                            <input type="number" id="packagingSpec" value="50" step="1" oninput="calculate()">
                        </div>
                    </div>
                </div>
                
                <!-- 头程物流与关税 -->
                <h2>二、头程物流与关税</h2>
                <div class="input-section">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="domesticShipping">国内段运费均摊 (CNY)</label>
                            <input type="number" id="domesticShipping" value="2" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="firstLegLogistics">头程物流单价 (USD)</label>
                            <input type="number" id="firstLegLogistics" value="2.5" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="customsDutyRate">海关关税税率</label>
                            <input type="number" id="customsDutyRate" value="0.05" step="0.01" oninput="calculate()">
                        </div>
                    </div>
                </div>
                
                <!-- 亚马逊平台变量 -->
                <h2>三、亚马逊平台变量</h2>
                <div class="input-section">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="referralFeeRate">佣金比例</label>
                            <input type="number" id="referralFeeRate" value="0.15" step="0.01" oninput="calculate()">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="fbaFee">FBA 配送费 (USD)</label>
                            <input type="number" id="fbaFee" value="3" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="storageFee">月度仓储费 (USD)</label>
                            <input type="number" id="storageFee" value="0.5" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="inboundFee">入库配置费 (USD)</label>
                            <input type="number" id="inboundFee" value="0.3" step="0.01" oninput="calculate()">
                        </div>
                    </div>
                </div>
                
                <!-- 营销与风控系数 -->
                <h2>四、营销与风控系数</h2>
                <div class="input-section">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="returnRate">预期退货率</label>
                            <input type="number" id="returnRate" value="0.05" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="unsellableLossRate">退货不可售折损率</label>
                            <input type="number" id="unsellableLossRate" value="0.5" step="0.01" oninput="calculate()">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="returnProcessingFee">退货处理费 (USD)</label>
                            <input type="number" id="returnProcessingFee" value="1" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="tacos">TACOS</label>
                            <input type="number" id="tacos" value="0.1" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="collectionFeeRate">第三方收款费率</label>
                            <input type="number" id="collectionFeeRate" value="0.005" step="0.001" oninput="calculate()">
                        </div>
                    </div>
                </div>
                
                <!-- 财务与汇率 -->
                <h2>五、财务与汇率</h2>
                <div class="input-section">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="exchangeRate">实时汇率 (USD/CNY)</label>
                            <input type="number" id="exchangeRate" value="7.2" step="0.01" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label for="taxRefundRate">退税税率</label>
                            <input type="number" id="taxRefundRate" value="0" step="0.01" oninput="calculate()">
                        </div>
                    </div>
                </div>
                
                <!-- 计算按钮 -->
                <button class="btn" onclick="calculate()">计算</button>
                <button class="btn" style="margin-left: 10px; background-color: #2196F3;" onclick="saveRecord()">保存记录</button>
            </div>
            
            <!-- 右侧结果区域 -->
            <div class="result-side">
                <!-- 计算结果 -->
                <div class="result-section">
                    <h2>六、计算结果</h2>
                    <div class="result-row">
                        <div class="result-group">
                            <label>单件总到仓成本 (USD)</label>
                            <div class="result-value" id="totalLandedCost"></div>
                        </div>
                        <div class="result-group">
                            <label>平台硬性扣费 (USD)</label>
                            <div class="result-value" id="amazonFixedFees"></div>
                        </div>
                    </div>
                    <div class="result-row">
                        <div class="result-group">
                            <label>动态风控与营销成本 (USD)</label>
                            <div class="result-value" id="variableCosts"></div>
                        </div>
                        <div class="result-group">
                            <label>盈亏平衡定价 (USD)</label>
                            <div class="result-value" id="breakEvenPrice"></div>
                        </div>
                    </div>
                    <div class="result-row">
                        <div class="result-group">
                            <label>单件绝对净利 (USD)</label>
                            <div class="result-value" id="netProfit"></div>
                        </div>
                    </div>
                    <div class="result-row">
                        <div class="result-group">
                            <label>净利润率</label>
                            <div class="result-value" id="netMargin"></div>
                        </div>
                        <div class="result-group">
                            <label>投资回报率 (ROI)</label>
                            <div class="result-value" id="roi"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 敏感性分析 -->
                <div class="sensitivity-section">
                    <h2>七、敏感性分析</h2>
                    <table>
                        <tr>
                            <th>目标零售价波动</th>
                            <th>-10%</th>
                            <th>-5%</th>
                            <th>基准</th>
                            <th>+5%</th>
                            <th>+10%</th>
                        </tr>
                        <tr>
                            <td>净利润率</td>
                            <td id="netMarginMinus10"></td>
                            <td id="netMarginMinus5"></td>
                            <td id="netMarginBase"></td>
                            <td id="netMarginPlus5"></td>
                            <td id="netMarginPlus10"></td>
                        </tr>
                        <tr>
                            <td>ROI</td>
                            <td id="roiMinus10"></td>
                            <td id="roiMinus5"></td>
                            <td id="roiBase"></td>
                            <td id="roiPlus5"></td>
                            <td id="roiPlus10"></td>
                        </tr>
                    </table>
                </div>
                
                <!-- 保存记录 -->
                <div class="sensitivity-section">
                    <h2>八、保存记录</h2>
                    <button class="btn" style="background-color: #f44336;" onclick="clearRecords()">清空所有记录</button>
                    <table id="recordsTable">
                        <thead>
                            <tr>
                                <th>产品名称</th>
                                <th>时间</th>
                                <th>目标零售价</th>
                                <th>净利润率</th>
                                <th>ROI</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordsBody">
                            <!-- 记录将通过JavaScript动态添加 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 初始化时加载保存的记录
        window.onload = function() {
            calculate();
            loadRecords();
        };
        
        function calculate() {
            // 获取输入值
            const purchasePrice = parseFloat(document.getElementById('purchasePrice').value) || 0;
            const packagingFee = parseFloat(document.getElementById('packagingFee').value) || 0;
            const packagingLength = parseFloat(document.getElementById('packagingLength').value) || 0;
            const packagingWidth = parseFloat(document.getElementById('packagingWidth').value) || 0;
            const packagingHeight = parseFloat(document.getElementById('packagingHeight').value) || 0;
            const productWeight = parseFloat(document.getElementById('productWeight').value) || 0;
            const packagingSpec = parseFloat(document.getElementById('packagingSpec').value) || 1;
            const domesticShipping = parseFloat(document.getElementById('domesticShipping').value) || 0;
            const firstLegLogistics = parseFloat(document.getElementById('firstLegLogistics').value) || 0;
            const customsDutyRate = parseFloat(document.getElementById('customsDutyRate').value) || 0;
            const targetRetailPrice = parseFloat(document.getElementById('targetRetailPrice').value) || 0;
            const referralFeeRate = parseFloat(document.getElementById('referralFeeRate').value) || 0;
            const fbaFee = parseFloat(document.getElementById('fbaFee').value) || 0;
            const storageFee = parseFloat(document.getElementById('storageFee').value) || 0;
            const inboundFee = parseFloat(document.getElementById('inboundFee').value) || 0;
            const returnRate = parseFloat(document.getElementById('returnRate').value) || 0;
            const unsellableLossRate = parseFloat(document.getElementById('unsellableLossRate').value) || 0;
            const returnProcessingFee = parseFloat(document.getElementById('returnProcessingFee').value) || 0;
            const tacos = parseFloat(document.getElementById('tacos').value) || 0;
            const collectionFeeRate = parseFloat(document.getElementById('collectionFeeRate').value) || 0;
            const exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 1;
            const taxRefundRate = parseFloat(document.getElementById('taxRefundRate').value) || 0;
            
            // 计算体积重
            const volumetricWeight = (packagingLength * packagingWidth * packagingHeight) / 6000;
            // 计算计费重量
            const chargeableWeight = Math.max(productWeight, volumetricWeight);
            
            // 计算单件总到仓成本
            const totalLandedCost = (purchasePrice + packagingFee + domesticShipping) / exchangeRate + 
                                   (firstLegLogistics * chargeableWeight) / packagingSpec + 
                                   (purchasePrice / exchangeRate) * customsDutyRate;
            
            // 计算平台硬性扣费
            const amazonFixedFees = (targetRetailPrice * referralFeeRate) + fbaFee + storageFee + inboundFee;
            
            // 计算动态风控与营销成本
            const marketingCost = targetRetailPrice * tacos;
            const returnLossCost = targetRetailPrice * returnRate * unsellableLossRate;
            const returnFeeCost = returnRate * returnProcessingFee;
            const variableCosts = marketingCost + returnLossCost + returnFeeCost;
            
            // 计算盈亏平衡定价
            const breakEvenPrice = (totalLandedCost + fbaFee + storageFee + inboundFee) / 
                                  (1 - referralFeeRate - tacos - (returnRate * unsellableLossRate) - collectionFeeRate);
            
            // 计算单件绝对净利
            const netProfit = targetRetailPrice - totalLandedCost - amazonFixedFees - variableCosts - (targetRetailPrice * collectionFeeRate);
            
            // 计算净利润率
            const netMargin = targetRetailPrice > 0 ? netProfit / targetRetailPrice : 0;
            
            // 计算投资回报率
            const totalInvestment = totalLandedCost + marketingCost;
            const roi = totalInvestment > 0 ? netProfit / totalInvestment : 0;
            
            // 计算敏感性分析
            const priceScenarios = [0.9, 0.95, 1, 1.05, 1.1];
            const netMarginScenarios = [];
            const roiScenarios = [];
            
            priceScenarios.forEach(priceMultiplier => {
                const scenarioPrice = targetRetailPrice * priceMultiplier;
                const scenarioMarketingCost = scenarioPrice * tacos;
                const scenarioReturnLossCost = scenarioPrice * returnRate * unsellableLossRate;
                const scenarioVariableCosts = scenarioMarketingCost + scenarioReturnLossCost + returnFeeCost;
                const scenarioAmazonFixedFees = (scenarioPrice * referralFeeRate) + fbaFee + storageFee + inboundFee;
                const scenarioNetProfit = scenarioPrice - totalLandedCost - scenarioAmazonFixedFees - scenarioVariableCosts - (scenarioPrice * collectionFeeRate);
                const scenarioNetMargin = scenarioPrice > 0 ? scenarioNetProfit / scenarioPrice : 0;
                const scenarioTotalInvestment = totalLandedCost + scenarioMarketingCost;
                const scenarioRoi = scenarioTotalInvestment > 0 ? scenarioNetProfit / scenarioTotalInvestment : 0;
                
                netMarginScenarios.push(scenarioNetMargin);
                roiScenarios.push(scenarioRoi);
            });
            
            // 更新结果
            document.getElementById('totalLandedCost').textContent = totalLandedCost.toFixed(2);
            document.getElementById('amazonFixedFees').textContent = amazonFixedFees.toFixed(2);
            document.getElementById('variableCosts').textContent = variableCosts.toFixed(2);
            document.getElementById('breakEvenPrice').textContent = breakEvenPrice.toFixed(2);
            document.getElementById('netProfit').textContent = netProfit.toFixed(2);
            
            // 更新净利润率并添加警告
            const netMarginElement = document.getElementById('netMargin');
            netMarginElement.textContent = (netMargin * 100).toFixed(2) + '%';
            if (netMargin < 0.15) {
                netMarginElement.className = 'result-value warning';
            } else {
                netMarginElement.className = 'result-value';
            }
            
            // 更新ROI并添加警告
            const roiElement = document.getElementById('roi');
            roiElement.textContent = (roi * 100).toFixed(2) + '%';
            if (roi < 1) {
                roiElement.className = 'result-value caution';
            } else {
                roiElement.className = 'result-value';
            }
            
            // 更新敏感性分析
            document.getElementById('netMarginMinus10').textContent = (netMarginScenarios[0] * 100).toFixed(2) + '%';
            document.getElementById('netMarginMinus5').textContent = (netMarginScenarios[1] * 100).toFixed(2) + '%';
            document.getElementById('netMarginBase').textContent = (netMarginScenarios[2] * 100).toFixed(2) + '%';
            document.getElementById('netMarginPlus5').textContent = (netMarginScenarios[3] * 100).toFixed(2) + '%';
            document.getElementById('netMarginPlus10').textContent = (netMarginScenarios[4] * 100).toFixed(2) + '%';
            
            document.getElementById('roiMinus10').textContent = (roiScenarios[0] * 100).toFixed(2) + '%';
            document.getElementById('roiMinus5').textContent = (roiScenarios[1] * 100).toFixed(2) + '%';
            document.getElementById('roiBase').textContent = (roiScenarios[2] * 100).toFixed(2) + '%';
            document.getElementById('roiPlus5').textContent = (roiScenarios[3] * 100).toFixed(2) + '%';
            document.getElementById('roiPlus10').textContent = (roiScenarios[4] * 100).toFixed(2) + '%';
        }
        
        // 保存记录
        function saveRecord() {
            // 获取当前计算结果
            const productName = document.getElementById('productName').value || '未命名产品';
            const targetRetailPrice = parseFloat(document.getElementById('targetRetailPrice').value) || 0;
            const netMargin = parseFloat(document.getElementById('netMargin').textContent.replace('%', '')) / 100;
            const roi = parseFloat(document.getElementById('roi').textContent.replace('%', '')) / 100;
            
            // 创建记录对象
            const record = {
                id: Date.now(),
                productName: productName,
                time: new Date().toLocaleString(),
                targetRetailPrice: targetRetailPrice.toFixed(2),
                netMargin: (netMargin * 100).toFixed(2),
                roi: (roi * 100).toFixed(2)
            };
            
            // 获取现有记录
            let records = JSON.parse(localStorage.getItem('amazonCalculatorRecords') || '[]');
            
            // 添加新记录
            records.push(record);
            
            // 保存到localStorage
            localStorage.setItem('amazonCalculatorRecords', JSON.stringify(records));
            
            // 重新加载记录
            loadRecords();
            
            // 显示保存成功提示
            alert('记录保存成功！');
        }
        
        // 加载记录
        function loadRecords() {
            const recordsBody = document.getElementById('recordsBody');
            recordsBody.innerHTML = '';
            
            // 获取记录
            const records = JSON.parse(localStorage.getItem('amazonCalculatorRecords') || '[]');
            
            // 反向遍历，最新的记录显示在前面
            for (let i = records.length - 1; i >= 0; i--) {
                const record = records[i];
                const row = document.createElement('tr');
                
                row.innerHTML = `
                    <td>${record.productName || '未命名产品'}</td>
                    <td>${record.time}</td>
                    <td>${record.targetRetailPrice}</td>
                    <td>${record.netMargin}%</td>
                    <td>${record.roi}%</td>
                    <td><button onclick="deleteRecord(${record.id})" style="background-color: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">删除</button></td>
                `;
                
                recordsBody.appendChild(row);
            }
        }
        
        // 删除记录
        function deleteRecord(id) {
            if (confirm('确定要删除这条记录吗？')) {
                // 获取现有记录
                let records = JSON.parse(localStorage.getItem('amazonCalculatorRecords') || '[]');
                
                // 过滤掉要删除的记录
                records = records.filter(record => record.id !== id);
                
                // 保存到localStorage
                localStorage.setItem('amazonCalculatorRecords', JSON.stringify(records));
                
                // 重新加载记录
                loadRecords();
            }
        }
        
        // 清空所有记录
        function clearRecords() {
            if (confirm('确定要清空所有记录吗？')) {
                localStorage.removeItem('amazonCalculatorRecords');
                loadRecords();
            }
        }
        
        // 初始计算
        calculate();
    </script>
</body>
</html>
